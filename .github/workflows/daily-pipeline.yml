name: Daily Economic Intelligence Pipeline

on:
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gate to 06:00 New York time
        id: ny_gate
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "NY time: $(TZ=America/New_York date '+%Y-%m-%d %H:%M:%S %Z')"
            echo "Manual dispatch detected; bypassing time gate."
            exit 0
          fi

          NY_HOUR=$(TZ=America/New_York date +%H)
          # GitHub scheduled jobs are not guaranteed to start exactly on the minute.
          # Run if the current New York hour is 06, regardless of minute.
          if [[ "$NY_HOUR" == "06" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi
          echo "NY time: $(TZ=America/New_York date '+%Y-%m-%d %H:%M:%S %Z')"

      - name: Set up Python
        if: steps.ny_gate.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.ny_gate.outputs.run == 'true'
        run: pip install -r requirements.txt

      - name: Materialize credentials and env
        if: steps.ny_gate.outputs.run == 'true'
        shell: bash
        env:
          ANTHROPIC_API_KEY_POLICY_TRACKER: ${{ secrets.ANTHROPIC_API_KEY_POLICY_TRACKER }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          CC_EMAIL: ${{ secrets.CC_EMAIL }}
          GMAIL_CREDENTIALS_JSON_B64: ${{ secrets.GMAIL_CREDENTIALS_JSON_B64 }}
          GMAIL_TOKEN_JSON_B64: ${{ secrets.GMAIL_TOKEN_JSON_B64 }}
          # Backward-compatible fallbacks (legacy/misnamed secrets)
          GMAIL_CREDENTIALS_FILE: ${{ secrets.GMAIL_CREDENTIALS_FILE }}
          GMAIL_TOKEN_FILE: ${{ secrets.GMAIL_TOKEN_FILE }}
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        run: |
          mkdir -p .secrets

          CRED_B64="${GMAIL_CREDENTIALS_JSON_B64}"
          TOKEN_B64="${GMAIL_TOKEN_JSON_B64}"
          if [[ -z "${CRED_B64}" && -n "${GMAIL_CREDENTIALS_FILE}" ]]; then
            CRED_B64="${GMAIL_CREDENTIALS_FILE}"
          fi
          if [[ -z "${TOKEN_B64}" && -n "${GMAIL_TOKEN_FILE}" ]]; then
            TOKEN_B64="${GMAIL_TOKEN_FILE}"
          fi

          if [[ -z "${ANTHROPIC_API_KEY_POLICY_TRACKER}" ]]; then
            echo "Missing required secret: ANTHROPIC_API_KEY_POLICY_TRACKER" >&2
            exit 1
          fi
          if [[ -z "${RECIPIENT_EMAIL}" ]]; then
            echo "Missing required secret: RECIPIENT_EMAIL" >&2
            exit 1
          fi
          if [[ -z "${CRED_B64}" ]]; then
            echo "Missing required secret: GMAIL_CREDENTIALS_JSON_B64 (or fallback GMAIL_CREDENTIALS_FILE)" >&2
            exit 1
          fi
          if [[ -z "${TOKEN_B64}" ]]; then
            echo "Missing required secret: GMAIL_TOKEN_JSON_B64 (or fallback GMAIL_TOKEN_FILE)" >&2
            exit 1
          fi

          if ! echo "${CRED_B64}" | base64 -d > .secrets/gmail_credentials.json; then
            echo "Could not decode Gmail credentials secret as base64 JSON." >&2
            exit 1
          fi
          if ! echo "${TOKEN_B64}" | base64 -d > .secrets/gmail_token.json; then
            echo "Could not decode Gmail token secret as base64 JSON." >&2
            exit 1
          fi

          {
            echo "ANTHROPIC_API_KEY_POLICY_TRACKER=${ANTHROPIC_API_KEY_POLICY_TRACKER}"
            echo "RECIPIENT_EMAIL=${RECIPIENT_EMAIL}"
            echo "GMAIL_CREDENTIALS_FILE=.secrets/gmail_credentials.json"
            echo "GMAIL_TOKEN_FILE=.secrets/gmail_token.json"
            echo "GMAIL_SENDER=${GMAIL_SENDER}"
            echo "EMAIL_FROM=${EMAIL_FROM}"
            echo "CC_EMAIL=${CC_EMAIL}"
          } > .env

      - name: Run pipeline (live send)
        if: steps.ny_gate.outputs.run == 'true'
        run: ./scripts/run_pipeline.sh

      - name: Upload logs and briefs artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-artifacts-${{ github.run_id }}
          path: |
            logs/
            briefs/
          if-no-files-found: ignore
